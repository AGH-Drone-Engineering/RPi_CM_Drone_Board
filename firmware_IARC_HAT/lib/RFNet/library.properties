name=RFNet
version=1.0.0
author=FalcO
maintainer=FalcO
sentence=Transport-agnostic RF networking middleware (FSK/LoRa) with fragmentation, AES-GCM security, EU duty-cycle enforcement and P2P/mesh routing.
paragraph=A modular link/network layer over RadioLib radios (SX1262 LoRa, CC1101 FSK) and custom backends, behind a single RFNode facade. Provides a compact wire frame, transparent fragmentation/reassembly, AES-GCM encryption with an NVS-persisted monotonic nonce counter and per-peer replay protection, ETSI EN 300 220 duty-cycle accounting, and P2P plus mesh modes with pluggable routing strategies. Portable via a HAL/OSAL/crypto/NVS/clock port layer.
category=Communication
url=https://github.com/AGH-Drone-Engineering/RPi_CM_Drone_Board
architectures=*
includes=RFNode.h
depends=RadioLib (^7.4.0)
